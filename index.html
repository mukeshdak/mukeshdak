<body>

<div id="md_nav"></div>
<div class="container" style="margin-top: 70px;">
    <table id="example" class="table table-bordered table-sm table-hover"></table>
</div><!-- close container-->

<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
<script>
var dataSet = [
    [ '0001', 'Bootstrap 4.1.3 template', ''],
    [ '0002', 'Bootstrap 4 - Horizontal and vertical centering.', ''],
    [ '0003', 'Sweet Alert example with bootstrap template', ''],
    [ '0004', 'Bootstrap-4 Modal Window ', ''],
    [ '0005', 'Accordian example', ''],
    [ '0006', 'Breadcrumb ', ''],
    [ '0007', 'Card', ''],
    [ '0008', 'Collapsible ', ''],
    [ '0009', 'Dropdown button ', ''],
    [ '0010', 'Material CSS', ''],
    [ '0011', 'Load content with Ajax', ''],
    [ '0012', 'Bootstrap Slider', ''],
    [ '0013', 'TinDog script', ''],
    [ '0014', 'DataTable Alternate', ''],
    [ '0015', 'DataTable Example', ''],
    [ '0016', 'Message at the bottom right of the page', ''],
    [ '0017', 'Page refresh link', ''],
    [ '0018', 'Math Object of JavaScript', ''],
    [ '0019', 'Jquery Example', ''],

    [ '0021', 'button selector jQuery', ''],
    [ '0022', 'table row color even odd jQuery', ''],
];

    $(document).ready(function() {

        $('#example').DataTable({
            "lengthMenu": [[10, 20, 50, -1], [10, 20, 50, "All"]],
            data: dataSet,

            stateSave: true,

            "order": [[ 0, "desc" ]],
            "columnDefs": [
                {
                    "targets": [ 2 ],
                    "visible": false
                }
            ],
            columns: [
                { title: "Dir" },
                { title: "Demo Name" },
                { title: "Description" }
            ],
        });

        var table = $('#example').DataTable();
        $('#example tbody').on('click', 'tr', function () {
            var data = table.row(this).data();
            var mdrow = "<td>"+data[0]+"</td>" + "<td><a href='/demos/"+data[0]+"/index.html' target='_blank'>"+data[1]+"</a></td>";
            $(this).html(mdrow);
            $(this).addClass('highlight');
        });

    } );
</script>
