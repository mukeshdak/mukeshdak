<!-- Bootstrap 4 template page -->
<!doctype html>
		 <html lang="en">
			 <head>
				 <!-- Required meta tags -->
				 <meta charset="utf-8">
				 <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
			
				 <!-- Bootstrap CSS -->
				 <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
         
         	<script type="text/javascript">
              function init(){
              var theObject = new XMLHttpRequest;
              theObject.open("GET", "ramayan.txt", true);

              theObject.onreadystatechange = function(){
                if(theObject.readyState == 4 && theObject.status == 200)
                  document.getElementById("container").innerHTML = theObject.responseText;
              }

              theObject.send();
            }
            </script>
         
         
         
				 <title>Bootstrap 4.1.3 - Load content with Ajax</title>
			 </head>
			 <body>
				<div class="container">
    
    <button onclick="init()" class="btn btn-dark btn-lg">Display Ramayan</button>
    
    <p><div id="container">Click button to load Ramayan here.</div>
<p>
	

</div>

			<!-- Optional JavaScript -->
			<!-- jQuery first, then Popper.js, then Bootstrap JS -->
			<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
			<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js"></script>
			<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"></script>
</body>
</html>
