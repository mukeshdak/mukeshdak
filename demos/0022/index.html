<!DOCTYPE html>
<html>
<head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script>
        $(document).ready(function(){
            $("tr:even").css("background-color", "#cca");
        });
    </script>
</head>
<body>

<p>Coloring table rows dynamically.</p>

<table border="1" style="border-color: lightpink" cellpadding="10px;" cellspacing="0">
    <tr>
        <td>Language</td>
        <td>started</td>
        <td>Usage</td>
    </tr>
    <tr>
        <td>php</td>
        <td>1996</td>
        <td>web design</td>
    </tr>
    <tr>
        <td>JavaScript</td>
        <td>1985</td>
        <td>client side scripting</td>
    </tr>
    <tr>
        <td>Python</td>
        <td>1999</td>
        <td>everywhere</td>
    </tr>
    <tr>
        <td>Swift</td>
        <td>2003</td>
        <td>I do not know</td>
    </tr>
</table>


</body>
</html>
