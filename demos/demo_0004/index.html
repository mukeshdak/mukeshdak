<!-- Bootstrap 4 template page -->
<!doctype html>
		 <html lang="en">
			 <head>
				 <!-- Required meta tags -->
				 <meta charset="utf-8">
				 <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
			
				 <!-- Bootstrap CSS -->
				 <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
				 <title>Bootstrap 4.1.3 - modal window example</title>
			 </head>
			 <body>



	<div class="container">

		<button type="button" class="btn btn-primary" data-toggle="modal" data-target="#modal1">Login</button>

		<div class="modal" id="modal1">
			<div class="modal-dialog">
				<div class="modal-content">	
					<div class="modal-header">
						<button type="button" class="close" data-dismiss="modal">&times;</button>
						<h3 class="modal-title">	This is modal heading</h3>
					</div>
					<div class="modal-body">
						Credit of this page goes to <br>
						<iframe width="560" height="315" src="https://www.youtube.com/embed/7aMRk9q_QLM" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>

					</div>
					<div class="modal-footer">
						<a href="http://mukeshdak.com" class="btn btn-warning">Hello</a>
						<a href="" class="btn btn-default" data-dismiss="modal">X</a>
					</div>
				</div>			
			</div>
			

		</div>


	</div>	








<!-- Optional JavaScript -->
			<!-- jQuery first, then Popper.js, then Bootstrap JS -->
			<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
			<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js"></script>
			<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"></script>
</body>
</html>
