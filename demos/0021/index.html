<!DOCTYPE html>
<html>
<head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script>
        $(document).ready(function(){
            $("button").click(function(){
                $("button").hide(1000);
            });
        });
    </script>
</head>
<body>

<p><button>Show/Hide this button itself</button></p>

<p>To hide the button above just use "button" selector and to hide  use selector ":button" </p>

<p><button>Show/Hide this 2</button></p>


</body>
</html>
