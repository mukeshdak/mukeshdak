<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <link href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet" ¿>
    <link href="https://cdn.datatables.net/1.10.16/css/dataTables.bootstrap4.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.3.1.js"></script>
    <script src="https://cdn.datatables.net/1.10.16/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.10.16/js/dataTables.bootstrap4.min.js"></script>
    <style>
        table.dataTable {
            border-collapse: collapse !important;
        }
    </style>
</head>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-3">
    <div class="container">
        <a class="navbar-brand" href="http://mukeshdak.com">DataTable Example</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
            </ul>
        </div>
    </div>
</nav>
<div class="container">
    <script>
        $(document).ready(function () {
            $('#example').DataTable({
                "order": [[1, "asc"]],
                "paging": true,
                "ordering": true,
                "info": true,
                "columnDefs": [
                    {
                        "targets": [0],
                        "visible": true,
                        "searchable": false
                    },
                    {
                        "targets": [1],
                        "visible": true
                    }
                ]
            });

            $('a.toggle-vis').on('click', function (e) {
                e.preventDefault();

                // Get the column API object
                var column = table.column($(this).attr('data-column'));

                // Toggle the visibility
                column.visible(!column.visible());
            });
        });
    </script>

    <div class="row">
        <div class="col-md-12">
            <div class="page-header clearfix">
                <h2 class="pull-left" style="display: inline-block">Finance</h2>
                <a href="/tables/add" class="btn btn-success float-right btn-sm px-1 py-0 mr-3" id="next">Add</a>
            </div>

            <table id="example" class="table table-bordered table-sm" style="width:100%">
                <thead>
                <tr>
                    <th>id</th>
                    <th>Site</th>
                    <th>Description</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr>
                    <td>1</td>
                    <td><a href="http://mukeshdak.com">mukeshdak.com</a></td>
                    <td>Main Website of Mukesh Dak</td>                   
                    <td><a href='/#/edit/1' title='Update Record' data-toggle='tooltip'>Edit</a> &nbsp; <a
                            href='/#/delete/1' title='Delete Record' data-toggle='tooltip'>Del</a></td>
                </tr>

                <tr>
                    <td>2</td>
                    <td><a href="http://bhulo.com">bhulo.com</a></td>
                    <td>Site to remember everything.</td>
                    <td><a href='/#/edit/2' title='Update Record' data-toggle='tooltip'>Edit</a> &nbsp; <a
                            href='/#/delete/2' title='Delete Record' data-toggle='tooltip'>Del</a></td>
                </tr>

                </tbody>
            </table>
        </div>
    </div>
    <script>
        document.getElementById("next").focus();
    </script>
</div><!-- close container-->
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"></script>
</body>
</html>
